name: android

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/android.yaml'
      - 'cmake/**'
      - 'sherpa-onnx/csrc/*'
      - 'sherpa-onnx/jni/*'
      - 'build-android*.sh'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android-qnn-aar:
    name: Android QNN AAR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update version
        shell: bash
        run: |
          ./new-release.sh
          git diff .

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ubuntu-latest-android-qnn

      # https://github.com/actions/setup-java
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Display NDK HOME
        shell: bash
        run: |
          echo "ANDROID_NDK_LATEST_HOME: ${ANDROID_NDK_LATEST_HOME}"
          ls -lh ${ANDROID_NDK_LATEST_HOME}

      - name: Download QNN SDK
        shell: bash
        run: |
          mkdir -p $HOME/qnn
          cd $HOME/qnn
          wget -q https://softwarecenter.qualcomm.com/api/download/software/sdks/Qualcomm_AI_Runtime_Community/All/2.47.0.260601/v2.47.0.260601.zip
          unzip -q v2.47.0.260601.zip
          rm v2.47.0.260601.zip
          echo "QNN_SDK_ROOT=$HOME/qnn/qairt/2.47.0.260601" >> "$GITHUB_ENV"
          ls -lh $HOME/qnn/qairt/2.47.0.260601/

      - name: Build android arm64-v8a with QNN
        shell: bash
        run: |
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"

          export ANDROID_NDK=$ANDROID_NDK_LATEST_HOME
          export SHERPA_ONNX_ENABLE_C_API=ON
          export SHERPA_ONNX_ENABLE_QNN=ON
          export QNN_SDK_ROOT=${{ env.QNN_SDK_ROOT }}

          ./build-android-arm64-v8a.sh

          readelf -l ./build-android-arm64-v8a/install/lib/*.so

          mkdir -p ./jniLibs/arm64-v8a/
          cp -v ./build-android-arm64-v8a/install/lib/*.so ./jniLibs/arm64-v8a/

          # Copy only the necessary QNN libraries from the SDK
          cp -v $QNN_SDK_ROOT/lib/aarch64-android/libQnnHtp.so ./jniLibs/arm64-v8a/
          cp -v $QNN_SDK_ROOT/lib/aarch64-android/libQnnHtpPrepare.so ./jniLibs/arm64-v8a/
          cp -v $QNN_SDK_ROOT/lib/aarch64-android/libQnnSystem.so ./jniLibs/arm64-v8a/
          # Copy QNN Htp Stub libraries for all supported Hexagon versions
          cp -v $QNN_SDK_ROOT/lib/aarch64-android/libQnnHtpV*Stub.so ./jniLibs/arm64-v8a/
          # Copy QNN Htp Skel libraries for all supported Hexagon versions
          cp -v $QNN_SDK_ROOT/lib/hexagon-v*/unsigned/libQnnHtpV*Skel.so ./jniLibs/arm64-v8a/

          echo "=== Files in jniLibs/arm64-v8a ==="
          ls -lh ./jniLibs/arm64-v8a/

      - name: Copy libs to AAR
        shell: bash
        run: |
          # Only arm64-v8a is supported for QNN
          rm -f android/SherpaOnnxAar/sherpa_onnx/src/main/jniLibs/arm64-v8a/.gitkeep
          cp -v ./jniLibs/arm64-v8a/* android/SherpaOnnxAar/sherpa_onnx/src/main/jniLibs/arm64-v8a/

      - name: Check libs
        shell: bash
        run: |
          ls -lh android/SherpaOnnxAar/sherpa_onnx/src/main/jniLibs/*

      - name: Build aar
        shell: bash
        run: |
          cd android/SherpaOnnxAar
          ./gradlew :sherpa_onnx:assembleRelease

      - name: Display aar
        shell: bash
        run: |
          cd android/SherpaOnnxAar
          ls -lh ./sherpa_onnx/build/outputs/aar/sherpa_onnx-release.aar
          cp ./sherpa_onnx/build/outputs/aar/sherpa_onnx-release.aar ../../

      - name: Rename aar
        shell: bash
        run: |
          SHERPA_ONNX_VERSION=$(grep "SHERPA_ONNX_VERSION" ./CMakeLists.txt  | cut -d " " -f 2  | cut -d '"' -f 2)
          echo "SHERPA_ONNX_VERSION=$SHERPA_ONNX_VERSION" >> "$GITHUB_ENV"
          mv sherpa_onnx-release.aar sherpa-onnx-${SHERPA_ONNX_VERSION}-qnn.aar

      - uses: actions/upload-artifact@v4
        with:
          name: sherpa-onnx-android-qnn-aar
          path: ./*.aar

      - name: Release android qnn aar
        if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          file_glob: true
          overwrite: true
          file: ./*.aar
